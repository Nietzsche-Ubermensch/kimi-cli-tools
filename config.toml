# =============================================================================
# KIMI CLI - OPTIMIZED CONFIGURATION
# =============================================================================
# System: Scraping & Software Engineering Toolkit
# MCP Servers: 7 (Firecrawl, Perplexity, Linear, GitHub, Brave, Chrome, Playwright)
# =============================================================================

# ─── SYSTEM PROMPT ───────────────────────────────────────────────────────────
# Optimized for minimal token usage, maximum tool routing accuracy
system_prompt = """You are an elite Scraping Engineer with 7 MCP tools.

TOOL ROUTING (strict):
• PERPLEXITY → Research, architecture, docs
• BRAVE → Find URLs only  
• FIRECRAWL → Data extraction (always JSON/markdown)
• PLAYWRIGHT → Browser automation, anti-bot
• CHROME DEVTOOLS → Live DOM debugging
• GITHUB → search_code first, never full repos
• LINEAR → Bug tracking, task management

EXECUTION CHAINS:
• SCRAPER: Research → Test → Code → Push
• DEBUG: Issue → Search → Fix → PR → Update

RULE: Be concise. Never dump raw HTML. Output code/JSON only."""

# ─── CORE SETTINGS ───────────────────────────────────────────────────────────
default_model = "kimi-k2-5"
default_thinking = true
default_yolo = false
default_editor = "code --wait"

# ─── OPTIMIZED MODELS (ESSENTIAL ONLY) ───────────────────────────────────────
[models.kimi-k2-5]
provider = "moonshot-global"
model = "kimi-k2.5"
max_context_size = 256000
capabilities = ["thinking", "image_in", "video_in"]

[models.kimi-k2-thinking]
provider = "moonshot-global"
model = "kimi-k2-thinking"
max_context_size = 256000
capabilities = ["thinking", "always_thinking"]

[models.kimi-for-coding]
provider = "kimi-code"
model = "kimi-for-coding"
max_context_size = 262144
capabilities = ["thinking", "image_in", "video_in"]

[models.claude-sonnet-4]
provider = "claude"
model = "claude-sonnet-4-20250514"
max_context_size = 200000
capabilities = ["thinking", "image_in"]

[models.gpt-4o]
provider = "openai"
model = "gpt-4o"
max_context_size = 128000
capabilities = ["thinking", "image_in"]

[models.gemini-2-5-pro]
provider = "gemini"
model = "gemini-2.5-pro-preview-06-05"
max_context_size = 1000000
capabilities = ["thinking", "image_in"]

[models.deepseek-reasoner]
provider = "deepseek"
model = "deepseek-reasoner"
max_context_size = 64000
capabilities = ["thinking", "always_thinking"]

# ─── PROVIDERS (CORE) ────────────────────────────────────────────────────────
[providers.moonshot-global]
type = "kimi"
base_url = "https://api.moonshot.ai/v1"
api_key = "${MOONSHOT_API_KEY}"

[providers.kimi-code]
type = "kimi"
base_url = "https://api.kimi.com/coding/v1"
api_key = "${KIMI_API_KEY}"

[providers.claude]
type = "anthropic"
base_url = "https://api.anthropic.com/v1"
api_key = "${ANTHROPIC_API_KEY}"

[providers.openai]
type = "openai-compatible"
base_url = "https://api.openai.com/v1"
api_key = "${OPENAI_API_KEY}"

[providers.gemini]
type = "openai-compatible"
base_url = "https://generativelanguage.googleapis.com/v1beta/openai"
api_key = "${GEMINI_API_KEY}"

[providers.deepseek]
type = "openai-compatible"
base_url = "https://api.deepseek.com/v1"
api_key = "${DEEPSEEK_API_KEY}"

[providers.venice]
type = "openai-compatible"
base_url = "https://api.venice.ai/api/v1"
api_key = "${VENICE_API_KEY}"

[providers.zhipu]
type = "openai-compatible"
base_url = "https://open.bigmodel.cn/api/paas/v4"
api_key = "${ZHIPU_API_KEY}"

[providers.modelscope]
type = "openai-compatible"
base_url = "https://api-inference.modelscope.cn/v1"
api_key = "${MODELSCOPE_API_KEY}"

[providers.nscale]
type = "openai-compatible"
base_url = "https://inference.api.nscale.com/v1"
api_key = "${NSCALE_API_KEY}"

# ─── PERFORMANCE OPTIMIZATION ────────────────────────────────────────────────
[loop_control]
max_steps_per_turn = 50
max_retries_per_step = 2
max_ralph_iterations = 0
reserved_context_size = 40000
compaction_trigger_ratio = 0.80

[background]
max_running_tasks = 3
read_max_bytes = 20000
notification_tail_lines = 10
notification_tail_chars = 2000
wait_poll_interval_ms = 300
worker_heartbeat_interval_ms = 5000
worker_stale_after_ms = 10000
kill_grace_period_ms = 1500
keep_alive_on_exit = false

[mcp.client]
tool_call_timeout_ms = 45000

# ─── COST OPTIMIZATION ───────────────────────────────────────────────────────
[budget]
ceiling_usd = 100.0
per_token_cost = 0.000002
entropy_budget = 80.0
warn_at_percent = 70.0
alert_at_percent = 85.0

# ─── TOOLS (OPTIMIZED GAMMA) ─────────────────────────────────────────────────
[tools.web_search]
enabled = true
base_gamma = 0.8
cost_usd = 0.02
protected = true

[tools.fetch]
enabled = true
base_gamma = 0.6
cost_usd = 0.01
protected = false

[tools.code_runner]
enabled = true
base_gamma = 0.5
cost_usd = 0.01
protected = false

[tools.quickjs]
enabled = true
base_gamma = 0.5
cost_usd = 0.01
protected = false

[tools.excel]
enabled = true
base_gamma = 0.4
cost_usd = 0.01
protected = false

[tools.memory]
enabled = true
base_gamma = 0.3
cost_usd = 0.005
protected = false

[tools.convert]
enabled = true
base_gamma = 0.1
cost_usd = 0.001
protected = false

[tools.date]
enabled = true
base_gamma = 0.1
cost_usd = 0.001
protected = false

[tools.rethink]
enabled = true
base_gamma = 0.1
cost_usd = 0.001
protected = false

[tools.random_choice]
enabled = true
base_gamma = 0.2
cost_usd = 0.001
protected = false

[tools.calculate_length]
enabled = true
base_gamma = 0.05
cost_usd = 0.001
protected = false

[tools.base64]
enabled = true
base_gamma = 0.05
cost_usd = 0.001
protected = false

[tools.mew]
enabled = true
base_gamma = 0.05
cost_usd = 0.001
protected = false

# ─── EXECUTION PROFILES ──────────────────────────────────────────────────────
[execution_profiles.utility]
temperature = 0.3
max_tokens = 4096
thinking = false

[execution_profiles.fast]
temperature = 0.5
max_tokens = 8192
thinking = false

[execution_profiles.deep]
temperature = 0.7
max_tokens = 32768
thinking = true

# ─── SERVICES (OPTIMIZED) ────────────────────────────────────────────────────
[services.moonshot_search]
base_url = "https://api.kimi.com/coding/v1/search"
api_key = "${KIMI_API_KEY}"

[services.moonshot_search.oauth]
storage = "file"
key = "oauth/kimi-code"

[services.moonshot_fetch]
base_url = "https://api.kimi.com/coding/v1/fetch"
api_key = "${KIMI_API_KEY}"

[services.moonshot_fetch.oauth]
storage = "file"
key = "oauth/kimi-code"

# ─── BEHAVIOR ─────────────────────────────────────────────────────────────────
[behavior]
grounding_trigger_gamma = 0.7
success_l_multiplier = 1.05
success_gamma_multiplier = 0.95
failure_l_multiplier = 0.90
failure_gamma_multiplier = 1.10
adaptive_temperature = true
enable_thermodynamic_tracking = true
auto_save_state = true

# ─── DASHBOARD ───────────────────────────────────────────────────────────────
[dashboard]
health_green_threshold = 80
health_yellow_threshold = 60
budget_healthy_threshold = 100.0
budget_warning_threshold = 50.0
enable_colors = true
verbose_tool_calls = false
audit_format = "formatted"

# ─── LOGGING ─────────────────────────────────────────────────────────────────
[logging]
level = "warn"
log_to_file = true
log_file_path = "~/.kimi/logs/kimi.log"
max_log_size_mb = 5
